<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Argus Incident Report</title>
  <style>
    :root {
      --ink: #1b2430;
      --muted: #64707d;
      --line: #d9dee7;
      --surface: #f6f7f9;
      --panel: #ffffff;
      --green: #0d7c66;
      --red: #b42318;
      --blue: #1d5fd1;
      --gold: #916400;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--surface);
      color: var(--ink);
      font: 14px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      background: #fff;
      border-bottom: 1px solid var(--line);
    }

    .topbar, main {
      max-width: 1160px;
      margin: 0 auto;
      padding: 18px 20px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 22px; }
    h2 { font-size: 16px; margin-bottom: 10px; }
    h3 { font-size: 13px; color: var(--muted); font-weight: 700; text-transform: uppercase; }
    .muted { color: var(--muted); }

    main {
      display: grid;
      gap: 18px;
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    select, button {
      min-height: 38px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 8px 11px;
    }

    button {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
      font-weight: 700;
      cursor: pointer;
    }

    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
    }

    .section-head {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .grid {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }

    .cell {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 88px;
      background: #fff;
    }

    .cell strong {
      display: block;
      margin-top: 6px;
      font-size: 20px;
      word-break: break-word;
    }

    .timeline {
      padding: 16px;
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: 150px 1fr;
      gap: 12px;
      border-left: 4px solid var(--green);
      padding: 10px 12px;
      background: #fff;
      border-radius: 8px;
      border-top: 1px solid var(--line);
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    .row.review { border-left-color: var(--gold); }
    .row.respond { border-left-color: var(--red); }

    pre {
      margin: 0;
      padding: 16px;
      max-height: 420px;
      overflow: auto;
      color: #e6edf3;
      background: #101820;
      font-size: 12px;
    }

    .status {
      padding: 4px 8px;
      border-radius: 999px;
      background: #eef5ff;
      color: #174ea6;
      font-size: 12px;
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      .topbar { flex-direction: column; align-items: flex-start; }
      .grid { grid-template-columns: 1fr; }
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Argus Incident Report</h1>
        <p class="muted">Audit view for autonomous and human-reviewed actions.</p>
      </div>
      <span class="status" id="apiStatus">API pending</span>
    </div>
  </header>
  <main>
    <section>
      <div class="section-head">
        <div>
          <h2>Report Source</h2>
          <p class="muted">Choose a scenario and generate the current report payload.</p>
        </div>
        <div class="toolbar">
          <select id="scenarioSelect"></select>
          <button id="generateBtn" type="button">Generate</button>
        </div>
      </div>
    </section>

    <section>
      <div class="section-head">
        <h2>Executive Snapshot</h2>
        <span class="status" id="reportStatus">Waiting</span>
      </div>
      <div class="grid" id="snapshot"></div>
    </section>

    <section>
      <div class="section-head">
        <h2>Action Timeline</h2>
      </div>
      <div class="timeline" id="timeline"></div>
    </section>

    <section>
      <div class="section-head">
        <h2>Evidence Payload</h2>
      </div>
      <pre id="payload">{}</pre>
    </section>
  </main>

  <script>
    const API = "http://127.0.0.1:8000";
    const apiStatus = document.querySelector("#apiStatus");
    const reportStatus = document.querySelector("#reportStatus");
    const scenarioSelect = document.querySelector("#scenarioSelect");
    const generateBtn = document.querySelector("#generateBtn");
    const snapshot = document.querySelector("#snapshot");
    const timeline = document.querySelector("#timeline");
    const payload = document.querySelector("#payload");

    async function loadScenarios() {
      try {
        const response = await fetch(`${API}/scenarios`);
        const data = await response.json();
        scenarioSelect.innerHTML = data.scenarios.map((scenario) => `<option value="${scenario.scenario_id}">${scenario.title}</option>`).join("");
        apiStatus.textContent = "API connected";
        if (data.scenarios.length) generateReport();
      } catch (error) {
        apiStatus.textContent = "API offline";
        scenarioSelect.innerHTML = `<option>Start API first</option>`;
      }
    }

    async function generateReport() {
      const id = scenarioSelect.value;
      if (!id) return;
      reportStatus.textContent = "Generating";
      const response = await fetch(`${API}/scenarios/${id}/run`, { method: "POST" });
      const data = await response.json();
      const decision = data.decision;
      const action = data.action_record;
      const review = data.review_decision;
      reportStatus.textContent = decision.auto_execute ? "Auto response" : decision.requires_human_approval ? "Review required" : "Observed";
      snapshot.innerHTML = `
        <div class="cell"><h3>Incident</h3><strong>${decision.incident_id}</strong></div>
        <div class="cell"><h3>Risk Action</h3><strong>${decision.action}</strong></div>
        <div class="cell"><h3>Confidence</h3><strong>${Math.round(decision.confidence * 100)}%</strong></div>
        <div class="cell"><h3>Approval</h3><strong>${decision.requires_human_approval ? "Required" : "Not required"}</strong></div>
      `;
      timeline.innerHTML = `
        <div class="row"><strong>Telemetry</strong><span>${data.event_count} event(s) collected from ${data.scenario.incident.host}</span></div>
        <div class="row"><strong>AI Result</strong><span>${data.ai_result.classification}</span></div>
        <div class="row ${decision.requires_human_approval ? "review" : ""}"><strong>Decision</strong><span>${decision.reasoning}</span></div>
        <div class="row ${decision.auto_execute ? "respond" : ""}"><strong>Action</strong><span>${action.action_type}: ${action.result}</span></div>
        <div class="row ${review ? "review" : ""}"><strong>Human Audit</strong><span>${review ? review.notes : "Available after autonomous action."}</span></div>
      `;
      payload.textContent = JSON.stringify(data, null, 2);
    }

    generateBtn.addEventListener("click", generateReport);
    loadScenarios();
  </script>
</body>
</html>
